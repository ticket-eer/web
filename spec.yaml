openapi: 3.0.3
info:
  title: Ticketeer API
  version: 1.0.0
  description: >
    API REST de billetterie ferroviaire Ticketeer.
    Gestion des utilisateurs, trajets, itinéraires, achats, transactions,
    billets numériques avec QR code, contrôle et administration.

servers:
  - url: http://localhost:8080
    description: Local
  - url: https://api.ticketeer.com
    description: Production

tags:
  - name: Auth
  - name: Users
  - name: Trajets
  - name: Connections
  - name: Transactions
  - name: Billets
  - name: Controles
  - name: UnitesControle
  - name: ServicesTransport
  - name: Admin

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Inscription d'un utilisateur
      description: Création d'un compte client par défaut.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Utilisateur créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/login:
    post:
      tags: [Auth]
      summary: Connexion utilisateur
      description: Authentifie un utilisateur et retourne un JWT.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: Profil courant
      responses:
        '200':
          description: Profil utilisateur connecté
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users:
    get:
      tags: [Users]
      summary: Lister les utilisateurs
      description: Réservé aux administrateurs.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: role
          schema:
            $ref: '#/components/schemas/Role'
      responses:
        '200':
          description: Liste des utilisateurs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{userId}:
    get:
      tags: [Users]
      summary: Détail d'un utilisateur
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Utilisateur trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Users]
      summary: Modifier un utilisateur
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Utilisateur modifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Users]
      summary: Supprimer un utilisateur
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Utilisateur supprimé
        '404':
          $ref: '#/components/responses/NotFound'

  /trajets:
    get:
      tags: [Trajets]
      summary: Rechercher les trajets disponibles
      description: Consultation des trajets disponibles avec filtres.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: villeDepart
          schema:
            type: string
        - in: query
          name: villeArrivee
          schema:
            type: string
        - in: query
          name: dateVoyage
          schema:
            type: string
            format: date
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            default: 20
      responses:
        '200':
          description: Liste des trajets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrajetListResponse'

    post:
      tags: [Trajets]
      summary: Créer un trajet
      description: Réservé à l'administration.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrajetCreateRequest'
      responses:
        '201':
          description: Trajet créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trajet'
        '403':
          $ref: '#/components/responses/Forbidden'

  /trajets/{trajetId}:
    get:
      tags: [Trajets]
      summary: Détail d'un trajet
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TrajetId'
      responses:
        '200':
          description: Trajet trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trajet'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Trajets]
      summary: Modifier un trajet
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TrajetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrajetUpdateRequest'
      responses:
        '200':
          description: Trajet modifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trajet'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Trajets]
      summary: Supprimer un trajet
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TrajetId'
      responses:
        '204':
          description: Trajet supprimé
        '404':
          $ref: '#/components/responses/NotFound'

  /connections/search:
    get:
      tags: [Connections]
      summary: Rechercher des correspondances (trajets multi-étapes)
      description: >
        Recherche les trajets directs et les connections multi-étapes entre deux villes.
        Par exemple : Havre -> Paris -> Toulouse. Utilise un algorithme BFS avec validation
        du timing de correspondance (minimum 15 minutes entre les trajets).
      parameters:
        - in: query
          name: villeDepart
          required: true
          schema:
            type: string
          description: Ville de départ
        - in: query
          name: villeArrivee
          required: true
          schema:
            type: string
          description: Ville de destination
        - in: query
          name: dateVoyage
          required: true
          schema:
            type: string
            format: date
          description: Date du voyage
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        '200':
          description: Liste des connections trouvées
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /connections/{connectionId}:
    get:
      tags: [Connections]
      summary: Détail d'une connection
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConnectionId'
      responses:
        '200':
          description: Connection trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionDto'
        '404':
          $ref: '#/components/responses/NotFound'

  /connections:
    get:
      tags: [Connections]
      summary: Lister toutes les connections (ADMIN)
      description: Endpoint réservé aux administrateurs pour consultation et debugging.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: villeDepart
          schema:
            type: string
        - in: query
          name: villeArrivee
          schema:
            type: string
        - in: query
          name: dateVoyage
          schema:
            type: string
            format: date
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        '200':
          description: Liste des connections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionListResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /transactions:
    get:
      tags: [Transactions]
      summary: Lister les transactions
      description: >
        Un client voit ses transactions. Un admin peut voir toutes les transactions.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: statut
          schema:
            $ref: '#/components/schemas/StatutTransaction'
      responses:
        '200':
          description: Liste des transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListResponse'

    post:
      tags: [Transactions]
      summary: Créer une transaction / initier un paiement
      description: >
        Enregistre une tentative de paiement pour un trajet ou un itinéraire. Si acceptée,
        un billet est généré. Conforme aux scénarios d'achat accepté / refusé.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionCreateRequest'
      responses:
        '201':
          description: Transaction créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionWithBilletResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /transactions/{transactionId}:
    get:
      tags: [Transactions]
      summary: Détail d'une transaction
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TransactionId'
      responses:
        '200':
          description: Transaction trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDto'
        '404':
          $ref: '#/components/responses/NotFound'

  /transactions/{transactionId}/confirm:
    post:
      tags: [Transactions]
      summary: Confirmer une transaction
      description: Simule le retour d'un prestataire de paiement.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TransactionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionConfirmRequest'
      responses:
        '200':
          description: Transaction mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionWithBilletResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /billets:
    get:
      tags: [Billets]
      summary: Lister les billets
      description: >
        Pour un client, renvoie "Mes billets". Pour un admin, peut renvoyer tous les billets.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: etat
          schema:
            $ref: '#/components/schemas/EtatBillet'
      responses:
        '200':
          description: Liste des billets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BilletListResponse'

  /billets/{billetId}:
    get:
      tags: [Billets]
      summary: Détail d'un billet
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BilletId'
      responses:
        '200':
          description: Billet trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BilletDto'
        '404':
          $ref: '#/components/responses/NotFound'

  /billets/{billetId}/download:
    get:
      tags: [Billets]
      summary: Télécharger le billet
      description: Retourne le billet PDF ou image.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BilletId'
      responses:
        '200':
          description: Fichier du billet
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /billets/{billetId}/qrcode:
    get:
      tags: [Billets]
      summary: Obtenir le QR code du billet
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BilletId'
      responses:
        '200':
          description: QR code
          content:
            image/png:
              schema:
                type: string
                format: binary
        '403':
          $ref: '#/components/responses/Forbidden'

  /billets/code/{codeOptique}:
    get:
      tags: [Billets]
      summary: Rechercher un billet par code optique
      description: Utilisé par l'application de contrôle.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: codeOptique
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Billet trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BilletDto'
        '404':
          description: Code optique inconnu
        '403':
          $ref: '#/components/responses/Forbidden'

  /billets/user/{userId}:
    get:
      tags: [Billets]
      summary: Lister les billets d'un utilisateur
      description: Permet à un utilisateur de voir ses propres billets, ou à un ADMIN de voir les billets de n'importe quel utilisateur.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
        - in: query
          name: etat
          schema:
            $ref: '#/components/schemas/EtatBillet'
          description: Filtrer les billets par leur état.
      responses:
        '200':
          description: Liste des billets de l'utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BilletListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Utilisateur non trouvé ou aucun billet.

  /controles:
    get:
      tags: [Controles]
      summary: Lister les contrôles
      description: Historique des validations pour contrôleurs et admins.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: resultat
          schema:
            $ref: '#/components/schemas/EtatBillet'
        - in: query
          name: billetId
          schema:
            type: integer
            format: int64
        - in: query
          name: agentId
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Liste des contrôles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControleListResponse'

    post:
      tags: [Controles]
      summary: Enregistrer un contrôle manuel
      description: Contrôle saisi manuellement par un contrôleur.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ControleCreateRequest'
      responses:
        '201':
          description: Contrôle enregistré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControleWithBilletResponse'

  /controles/scan:
    post:
      tags: [Controles]
      summary: Scanner / valider un QR code
      description: >
        Recherche un billet par code optique, vérifie son état et enregistre l'opération
        de contrôle : valide, déjà utilisé, expiré ou invalide.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ControleScanRequest'
      responses:
        '200':
          description: Résultat du contrôle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControleScanResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /controles/{controleId}:
    get:
      tags: [Controles]
      summary: Détail d'un contrôle
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ControleId'
      responses:
        '200':
          description: Contrôle trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Controle'
        '404':
          $ref: '#/components/responses/NotFound'

  /unites-controle:
    get:
      tags: [UnitesControle]
      summary: Lister les unités de contrôle
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des unités
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UniteControleListResponse'

    post:
      tags: [UnitesControle]
      summary: Créer une unité de contrôle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UniteControleCreateRequest'
      responses:
        '201':
          description: Unité créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UniteControle'

  /unites-controle/{uniteId}:
    get:
      tags: [UnitesControle]
      summary: Détail d'une unité de contrôle
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UniteId'
      responses:
        '200':
          description: Unité trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UniteControle'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [UnitesControle]
      summary: Modifier une unité de contrôle
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UniteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UniteControleUpdateRequest'
      responses:
        '200':
          description: Unité modifiée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UniteControle'

    delete:
      tags: [UnitesControle]
      summary: Supprimer une unité de contrôle
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UniteId'
      responses:
        '204':
          description: Unité supprimée

  /services-transport:
    get:
      tags: [ServicesTransport]
      summary: Lister les services de transport
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des services
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceTransportListResponse'

    post:
      tags: [ServicesTransport]
      summary: Créer un service de transport
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceTransportCreateRequest'
      responses:
        '201':
          description: Service créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceTransport'

  /services-transport/{serviceId}:
    get:
      tags: [ServicesTransport]
      summary: Détail d'un service de transport
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ServiceId'
      responses:
        '200':
          description: Service trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceTransport'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [ServicesTransport]
      summary: Modifier un service de transport
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ServiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceTransportUpdateRequest'
      responses:
        '200':
          description: Service modifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceTransport'

    delete:
      tags: [ServicesTransport]
      summary: Supprimer un service de transport
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ServiceId'
      responses:
        '204':
          description: Service supprimé

  /admin/dashboard:
    get:
      tags: [Admin]
      summary: Tableau de bord administrateur
      description: Données agrégées pour l'administration.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Indicateurs admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardResponse'

  /admin/billets:
    get:
      tags: [Admin]
      summary: Lister tous les billets
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tous les billets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BilletListResponse'

  /admin/controles:
    get:
      tags: [Admin]
      summary: Historique complet des contrôles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tous les contrôles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControleListResponse'

  /admin/connections:
    post:
      tags: [Admin]
      summary: Créer une connection
      description: Créer une nouvelle connection avec des trajets spécifiés.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectionCreateRequest'
      responses:
        '201':
          description: Connection créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionAdminDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/connections/{connectionId}:
    patch:
      tags: [Admin]
      summary: Modifier une connection
      description: Mettre à jour une connection existante.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConnectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectionUpdateRequest'
      responses:
        '200':
          description: Connection modifiée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionAdminDto'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      tags: [Admin]
      summary: Supprimer une connection
      description: Supprimer une connection existante.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConnectionId'
      responses:
        '204':
          description: Connection supprimée
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserId:
      in: path
      name: userId
      required: true
      schema:
        type: integer
        format: int64
    BilletId:
      in: path
      name: billetId
      required: true
      schema:
        type: integer
        format: int64
    TransactionId:
      in: path
      name: transactionId
      required: true
      schema:
        type: integer
        format: int64
    TrajetId:
      in: path
      name: trajetId
      required: true
      schema:
        type: integer
        format: int64
    ConnectionId:
      in: path
      name: connectionId
      required: true
      schema:
        type: integer
        format: int64
    ControleId:
      in: path
      name: controleId
      required: true
      schema:
        type: integer
        format: int64
    UniteId:
      in: path
      name: uniteId
      required: true
      schema:
        type: integer
        format: int64
    ServiceId:
      in: path
      name: serviceId
      required: true
      schema:
        type: integer
        format: int64

  responses:
    BadRequest:
      description: Requête invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Non authentifié
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Accès interdit
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Role:
      type: string
      enum: [CLIENT, CONTROLEUR, ADMIN]

    EtatBillet:
      type: string
      enum: [NON_UTILISE, UTILISE, EXPIRE, INVALIDE]

    StatutTransaction:
      type: string
      enum: [ACCEPTEE, REFUSEE]

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nom:
          type: string
        email:
          type: string
          format: email
        matricule:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/Role'
        uniteControleId:
          type: integer
          format: int64
          nullable: true
        createdAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [nom, email, motDePasse]
      properties:
        nom:
          type: string
        email:
          type: string
          format: email
        motDePasse:
          type: string
          format: password

    LoginRequest:
      type: object
      required: [email, motDePasse]
      properties:
        email:
          type: string
          format: email
        motDePasse:
          type: string
          format: password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        type:
          type: string
          example: Bearer
        user:
          $ref: '#/components/schemas/User'

    UserUpdateRequest:
      type: object
      properties:
        nom:
          type: string
        email:
          type: string
          format: email
        motDePasse:
          type: string
        matricule:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/Role'
        uniteControleId:
          type: integer
          format: int64
          nullable: true

    Trajet:
      type: object
      properties:
        id:
          type: integer
          format: int64
        villeDepart:
          type: string
        villeArrivee:
          type: string
        dateVoyage:
          type: string
          format: date
        train:
          type: string
        heureDepart:
          type: string
          format: time
        heureArrivee:
          type: string
          format: time
        connectionId:
          type: integer
          format: int64
          nullable: true

    TrajetCreateRequest:
      type: object
      required:
        [villeDepart, villeArrivee, dateVoyage, train, heureDepart, heureArrivee]
      properties:
        villeDepart:
          type: string
        villeArrivee:
          type: string
        dateVoyage:
          type: string
          format: date
        train:
          type: string
        heureDepart:
          type: string
          format: time
        heureArrivee:
          type: string
          format: time
        connectionId:
          type: integer
          format: int64
          nullable: true

    TrajetUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/TrajetCreateRequest'

    Transaction:
      type: object
      properties:
        id:
          type: integer
          format: int64
        montant:
          type: number
          format: double
        dateHeure:
          type: string
          format: date-time
        statut:
          $ref: '#/components/schemas/StatutTransaction'
        moyenPaiement:
          type: string
        userId:
          type: integer
          format: int64
        billetId:
          type: integer
          format: int64
          nullable: true
        trajetId:
          type: integer
          format: int64
          nullable: true
        connectionId:
          type: integer
          format: int64
          nullable: true

    TransactionCreateRequest:
      type: object
      required: [moyenPaiement, montant]
      properties:
        userId:
          type: integer
          format: int64
          nullable: true
          description: >
            Optionnel. Permet à un ADMIN de créer une transaction pour un autre utilisateur.
            Si absent, la transaction est créée pour l'utilisateur authentifié.
        montant:
          type: number
          format: double
        moyenPaiement:
          type: string
          example: CARTE
        trajetId:
          type: integer
          format: int64
          nullable: true
        connectionId:
          type: integer
          format: int64
          nullable: true
      description: >
        Fournir soit trajetId, soit connectionId.

    TransactionConfirmRequest:
      type: object
      required: [statut]
      properties:
        statut:
          $ref: '#/components/schemas/StatutTransaction'

    Billet:
      type: object
      properties:
        id:
          type: integer
          format: int64
        codeOptique:
          type: string
        dateValidite:
          type: string
          format: date
        dateAchat:
          type: string
          format: date
        etatBillet:
          $ref: '#/components/schemas/EtatBillet'
        userId:
          type: integer
          format: int64
        transactionId:
          type: integer
          format: int64
        trajetId:
          type: integer
          format: int64
          nullable: true
        connectionId:
          type: integer
          format: int64
          nullable: true
        villeDepart:
          type: string
          nullable: true
        villeArrivee:
          type: string
          nullable: true
        heureDepart:
          type: string
          format: time
          nullable: true
        heureArrivee:
          type: string
          format: time
          nullable: true
        qrCodeUrl:
          type: string
          nullable: true

    Controle:
      type: object
      properties:
        id:
          type: integer
          format: int64
        dateHeure:
          type: string
          format: date-time
        resultat:
          $ref: '#/components/schemas/EtatBillet'
        agentId:
          type: integer
          format: int64
        billetId:
          type: integer
          format: int64

    ControleCreateRequest:
      type: object
      required: [billetId, resultat]
      properties:
        billetId:
          type: integer
          format: int64
        resultat:
          $ref: '#/components/schemas/EtatBillet'

    ControleScanRequest:
      type: object
      required: [codeOptique]
      properties:
        codeOptique:
          type: string
        uniteControleId:
          type: integer
          format: int64
          nullable: true

    ControleScanResponse:
      type: object
      properties:
        message:
          type: string
          example: Billet accepté
        resultat:
          $ref: '#/components/schemas/EtatBillet'
        billet:
          $ref: '#/components/schemas/Billet'
          nullable: true
        controle:
          $ref: '#/components/schemas/Controle'
          nullable: true

    ControleWithBilletResponse:
      type: object
      properties:
        controle:
          $ref: '#/components/schemas/Controle'
        billet:
          $ref: '#/components/schemas/Billet'

    UniteControle:
      type: object
      properties:
        id:
          type: integer
          format: int64
        modele:
          type: string
        dateAcquisition:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    UniteControleCreateRequest:
      type: object
      required: [modele, dateAcquisition]
      properties:
        modele:
          type: string
        dateAcquisition:
          type: string
          format: date

    UniteControleUpdateRequest:
      type: object
      properties:
        modele:
          type: string
        dateAcquisition:
          type: string
          format: date

    ServiceTransport:
      type: object
      properties:
        id:
          type: integer
          format: int64
        villeDepart:
          type: string
        villeArrivee:
          type: string
        train:
          type: string
        frequence:
          type: string
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    ServiceTransportCreateRequest:
      type: object
      required: [villeDepart, villeArrivee, train, frequence]
      properties:
        villeDepart:
          type: string
        villeArrivee:
          type: string
        train:
          type: string
        frequence:
          type: string

    ServiceTransportUpdateRequest:
      type: object
      properties:
        villeDepart:
          type: string
        villeArrivee:
          type: string
        train:
          type: string
        frequence:
          type: string

    ServiceTransportListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ServiceTransport'

    AdminDashboardResponse:
      type: object
      properties:
        totalUsers:
          type: integer
          format: int64
        totalBillets:
          type: integer
          format: int64
        totalTransactions:
          type: integer
          format: int64
        totalControles:
          type: integer
          format: int64
        billetsParEtat:
          type: object
          additionalProperties:
            type: integer
            format: int64

    TransactionWithBilletResponse:
      type: object
      properties:
        transaction:
          $ref: '#/components/schemas/Transaction'
        billet:
          $ref: '#/components/schemas/Billet'
          nullable: true

    UserListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/User'

    TrajetListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Trajet'

    TransactionListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'

    BilletListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Billet'

    ControleListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Controle'

    UniteControleListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/UniteControle'

    ConnectionLegDto:
      type: object
      description: Un trajet unique dans une connection multi-étapes
      properties:
        trajetId:
          type: integer
          format: int64
        villeDepart:
          type: string
        villeArrivee:
          type: string
        heureDepart:
          type: string
          format: time
        heureArrivee:
          type: string
          format: time
        train:
          type: string

    Connection:
      type: object
      description: Une connection (correspondance) entre deux villes, possiblement multi-étapes
      properties:
        id:
          type: integer
          format: int64
        villeDepart:
          type: string
        villeArrivee:
          type: string
        dateVoyage:
          type: string
          format: date
        legsCount:
          type: integer
          description: Nombre de trajets constituant cette connection
        totalDurationMinutes:
          type: integer
          description: Durée totale du trajet depuis départ jusqu'à arrivée
        legs:
          type: array
          items:
            $ref: '#/components/schemas/ConnectionLegDto'

    ConnectionListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ConnectionDto'
        totalCount:
          type: integer
          description: Nombre total de connections trouvées (avant pagination)

    ConnectionDto:
      type: object
      description: Data Transfer Object pour une connection
      properties:
        id:
          type: integer
          format: int64
        villeDepart:
          type: string
        villeArrivee:
          type: string
        dateVoyage:
          type: string
          format: date
        legsCount:
          type: integer
        totalDurationMinutes:
          type: integer
        legs:
          type: array
          items:
            $ref: '#/components/schemas/ConnectionLegDto'
        price:
          type: integer
          nullable: true

    ConnectionAdminDto:
      type: object
      description: DTO renvoyé par l'administration des connections
      properties:
        id:
          type: integer
          format: int64
        villeDepart:
          type: string
        villeArrivee:
          type: string
        dateVoyage:
          type: string
          format: date
        legsCount:
          type: integer
        totalDurationMinutes:
          type: integer
        price:
          type: integer
          nullable: true
        trajetIds:
          type: string

    ConnectionCreateRequest:
      type: object
      description: Requête de création d'une connection
      required: [villeDepart, villeArrivee, dateVoyage, trajetIds, totalDurationMinutes, legsCount, price]
      properties:
        villeDepart:
          type: string
        villeArrivee:
          type: string
        trajetIds:
          type: array
          minItems: 1
          items:
            type: integer
            format: int64
        dateVoyage:
          type: string
          format: date
        totalDurationMinutes:
          type: integer
        legsCount:
          type: integer
        price:
          type: integer

    ConnectionUpdateRequest:
      type: object
      properties:
        villeDepart:
          type: string
        villeArrivee:
          type: string
        dateVoyage:
          type: string
          format: date
        trajetIds:
          type: array
          items:
            type: integer
            format: int64
        totalDurationMinutes:
          type: integer
        legsCount:
          type: integer
        price:
          type: integer

    TransactionDto:
      $ref: '#/components/schemas/Transaction'

    BilletDto:
      $ref: '#/components/schemas/Billet'

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string